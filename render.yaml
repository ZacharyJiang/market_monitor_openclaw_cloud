services:
  - type: web
    name: etf-nexus-monitor
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main_optimized:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: REFRESH_MINUTES
        value: "1"
      - key: KLINE_REFRESH_MINUTES
        value: "60"
      - key: KLINE_BATCH_SIZE
        value: "1"
      - key: BASE_REQUEST_INTERVAL
        value: "2.0"
      - key: MAX_REQUEST_INTERVAL
        value: "10.0"
      - key: CIRCUIT_BREAKER_THRESHOLD
        value: "5"
      - key: CIRCUIT_BREAKER_COOLDOWN
        value: "300"
      - key: USE_MOCK
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.0"
